services:
  backend:
    build:
      context: ./backend
    environment:
      EPUB_DATA_DIR: /app/data
      EPUB_CORS_ORIGINS: '["http://localhost:5173","http://127.0.0.1:5173"]'
    volumes:
      - ./data:/app/data
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
    depends_on:
      - backend
    ports:
      - "5173:5173"
